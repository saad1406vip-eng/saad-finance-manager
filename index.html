<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدير مصروفاتي</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    margin: 0;
    background: #f5f5f5;
}
header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}
.tabs {
    display: flex;
    overflow-x: auto;
    background: #34495e;
}
.tabs button {
    flex: 1;
    padding: 10px;
    color: white;
    background: none;
    border: none;
}
.tabs button.active {
    background: #1abc9c;
}
.section {
    display: none;
    padding: 15px;
}
.section.active {
    display: block;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}
button.add {
    background: green;
    color: white;
    padding: 10px;
    border: none;
}
.item {
    background: white;
    margin: 5px 0;
    padding: 10px;
}
</style>
</head>

<body>

<header>📊 مدير مصروفاتي</header>

<div class="tabs">
<button onclick="showTab(0)">الالتزامات</button>
<button onclick="showTab(1)">الإلزامي</button>
<button onclick="showTab(2)">اختياري</button>
<button onclick="showTab(3)">بياناتي</button>
<button onclick="showTab(4)">التحليل</button>
</div>

<div id="sections">

<div class="section active">
<h3>إضافة التزام</h3>
<input id="name" placeholder="اسم الالتزام">
<input id="amount" type="number" placeholder="المبلغ">
<input id="months" type="number" placeholder="عدد الأشهر">
<button class="add" onclick="addItem()">إضافة</button>
<div id="list"></div>
</div>

<div class="section"><h3>مصروفات إلزامية</h3></div>
<div class="section"><h3>مصروفات اختيارية</h3></div>

<div class="section">
<h3>بياناتي</h3>
<input id="salary" type="number" placeholder="الراتب">
</div>

<div class="section">
<h3>التحليل المالي</h3>
<button onclick="analyze()">احسب</button>
<p id="result"></p>

<button onclick="generateLetter()">إنشاء خطاب</button>
<pre id="letter"></pre>
</div>

</div>

<script>

let data = [];

function showTab(i){
    document.querySelectorAll('.section').forEach((s, index)=>{
        s.classList.toggle('active', index===i);
    });
}

function addItem(){
    let name = document.getElementById('name').value;
    let amount = Number(document.getElementById('amount').value);

    data.push({name, amount});
    render();
}

function render(){
    let list = document.getElementById('list');
    list.innerHTML = "";
    data.forEach(d=>{
        list.innerHTML += `<div class="item">${d.name} - ${d.amount} ريال</div>`;
    });
}

function analyze(){
    let salary = Number(document.getElementById('salary').value);
    let total = data.reduce((a,b)=>a+b.amount,0);
    let remaining = salary - total;

    document.getElementById('result').innerText =
    `إجمالي الالتزامات: ${total} ريال
المتبقي: ${remaining} ريال`;
}

function generateLetter(){
    let text = `
إلى من يهمه الأمر

أفيدكم بأن لدي التزامات مالية قائمة، وأواجه ظروف مالية حالية،
آمل منكم التكرم بالنظر في وضعي وإعادة جدولة الالتزامات.

وتفضلوا بقبول فائق الاحترام
`;

    document.getElementById('letter').innerText = text;
}

</script>

</body>
</html>
