<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>مدير مصروفاتي والتزاماتي | نظام مالي متكامل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', sans-serif; background: #f4f7fc; direction: rtl; padding-bottom: 30px; color: #1a2c3e; }
    .app-header { background: #ffffff; padding: 20px 16px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border-bottom: 1px solid #e2edf2; margin-bottom: 20px; }
    .app-header h1 { font-size: 1.6rem; font-weight: 600; color: #1f5e6e; }
    .tabs { display: flex; background: #fff; margin: 0 12px 20px; border-radius: 60px; border: 1px solid #e9edf2; overflow: hidden; }
    .tab-btn { flex: 1; background: transparent; border: none; padding: 10px 6px; font-weight: 600; color: #5c6f87; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .tab-btn.active { background: #e9f3f0; color: #1f6e5c; border-bottom: 2px solid #1f6e5c; }
    .section { display: none; padding: 0 12px; animation: fadeIn 0.2s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 20px; border: 1px solid #eef2f8; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .item { background: #ffffff; border-radius: 18px; padding: 14px; margin: 12px 0; border: 1px solid #e6edf4; transition: all 0.2s; }
    .item.paid-item { background: #e6f7ec; border-right: 4px solid #2e7d64; }
    .item.deferred-item { background: #fff8e7; border-right: 4px solid #f1c40f; }
    .item.frozen-item { background: #f9fafb; border-right: 4px solid #94a3b8; opacity: 0.85; }
    .item-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .item-name { font-weight: 700; font-size: 1rem; color: #1e2f3e; }
    .amount-badge { background: #eef3fa; padding: 4px 12px; border-radius: 40px; font-weight: 600; color: #1f6e5c; font-size: 0.85rem; }
    .status-badge-sm { font-size: 0.7rem; padding: 3px 10px; border-radius: 40px; background: #e2e8f0; display: inline-block; margin-right: 8px; }
    .btn-group { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: none; padding: 8px 14px; border-radius: 32px; font-weight: 500; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: inherit; background: #f1f5f9; color: #2c3e50; }
    button:hover { transform: translateY(-1px); filter: brightness(0.96); }
    .btn-add { background: #1f6e5c; color: white; }
    .btn-delete { background: #fee2e2; color: #b91c1c; }
    .btn-edit { background: #fff3e0; color: #b45f06; }
    .btn-pay { background: #d4edda; color: #155724; }
    .btn-defer { background: #fff3cd; color: #856404; }
    .btn-freeze { background: #e2e8f0; color: #475569; }
    input { width: 100%; padding: 12px 16px; margin: 8px 0; border: 1px solid #cbdde9; border-radius: 32px; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
    input:focus { outline: none; border-color: #1f6e5c; box-shadow: 0 0 0 2px rgba(31,110,92,0.1); }
    .result-box { background: #f8fafd; border-radius: 24px; padding: 18px; margin: 12px 0; border: 1px solid #e2edf2; }
    .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 32px; padding: 24px; width: 85%; max-width: 340px; text-align: center; }
    .checkbox-group { text-align: right; margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }
    .checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 1rem; }
    .archive-entry { background: #fef9e6; border-radius: 16px; padding: 12px; margin-top: 12px; font-size: 0.8rem; border: 1px solid #fdebb3; }
    hr { margin: 16px 0; border: none; border-top: 1px solid #e2edf2; }
    h4 { margin: 12px 0 8px; color: #2c3e50; }
  </style>
</head>
<body>
<div class="app-header"><h1>📋 مدير مصروفاتي والتزاماتي</h1></div>
<div class="tabs">
  <button class="tab-btn active" data-tab="0">🏦 البنكية</button>
  <button class="tab-btn" data-tab="1">🏡 السلف والعقار</button>
  <button class="tab-btn" data-tab="2">🛒 المصاريف</button>
  <button class="tab-btn" data-tab="3">📊 التحليل & التقارير</button>
</div>

<!-- الأقسام -->
<div class="section active" id="section-0"><div class="card"><h3 style="margin-bottom: 12px;">الالتزامات البنكية</h3><div id="bankContainer"></div><input id="newBankName" placeholder="اسم البنك"><input id="newBankAmount" type="number" placeholder="القسط الشهري"><button class="btn-add" id="addBankBtn">➕ إضافة بند بنكي</button></div></div>
<div class="section" id="section-1"><div class="card"><h3 style="margin-bottom: 12px;">السلف والعقار</h3><div id="loansContainer"></div><input id="newLoanName" placeholder="الاسم"><input id="newLoanAmount" type="number" placeholder="المبلغ الشهري"><button class="btn-add" id="addLoanBtn">➕ إضافة سلفة / عقار</button></div></div>
<div class="section" id="section-2"><div class="card"><h3 style="margin-bottom: 12px;">المصاريف الشهرية</h3><div id="expensesContainer"></div><input id="newExpName" placeholder="اسم المصروف"><input id="newExpAmount" type="number" placeholder="المبلغ الشهري"><button class="btn-add" id="addExpBtn">➕ إضافة مصروف</button></div></div>

<div class="section" id="section-3">
  <div class="card">
    <h3>📊 التحليل المالي والتقارير</h3>
    <div style="font-size:0.85rem; margin-bottom:12px; color:#4a627a;">📅 التاريخ الميلادي: <span id="currentGregorianDate"></span></div>
    <input type="number" id="salaryInput" placeholder="🏦 الراتب الشهري">
    <button class="btn-add" id="analyzeBtn" style="width:100%; margin:10px 0;">📐 حساب الالتزامات المستحقة</button>
    <div id="analysisResult" class="result-box"><p id="resultText">-- انتظر التحليل --</p><div id="statusMessage"></div></div>
    <div class="flex-btns">
      <button id="customReportBtn" class="btn-add" style="background:#2c5282;">📄 تقرير مخصص</button>
      <button id="shareCustomBtn" class="btn-add" style="background:#25D366;">📱 مشاركة واتساب</button>
      <button id="printCustomBtn" class="btn-add" style="background:#4b5563;">🖨️ طباعة تقرير</button>
    </div>
    <div id="fullReportContainer" style="margin-top: 16px;"></div>
    <hr>
    <h4>📦 الأرشيف الشهري (يوم 27 من كل شهر)</h4>
    <button id="viewArchiveBtn" class="btn-add" style="background:#6c757d;">📂 عرض الأرشيف</button>
    <div id="archiveContainer"></div>
  </div>
</div>

<!-- مودال اختيار التبويبات -->
<div id="reportModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px;">اختر التبويبات للتقرير</h3>
    <div class="checkbox-group">
      <label><input type="checkbox" id="includeBank" checked> 🏦 البنكية</label>
      <label><input type="checkbox" id="includeLoans" checked> 🏡 السلف والعقار</label>
      <label><input type="checkbox" id="includeExpenses" checked> 🛒 المصاريف</label>
    </div>
    <div class="flex-btns" style="justify-content:center; margin-top: 20px;">
      <button id="modalConfirmBtn" class="btn-add">تأكيد وإنشاء</button>
      <button id="modalCloseBtn" style="background:#ccc;">إلغاء</button>
    </div>
  </div>
</div>

<script>
  // --- هيكل البيانات مع دعم paymentStatus ---
  // منطق العمل:
  // - paid (مدفوع): يخصم من الراتب (تم صرف المبلغ)
  // - deferred (مؤجل): لا يخصم من الراتب (لم يصرف بعد)
  // - frozen (مجمد): لا يخصم من الراتب (التزام مجمد)
  // - active (نشط): يخصم من الراتب (الوضع الافتراضي)
  let appData = JSON.parse(localStorage.getItem("financeProPlusV4")) || {
    bank: [
      { name: "تمويل الراجحي", amount: 5311.30, paymentStatus: "active" },
      { name: "بنك الرياض", amount: 5168.99, paymentStatus: "frozen" },
      { name: "تمويل إضافي", amount: 0, paymentStatus: "frozen" }
    ],
    loans: [
      { name: "قسط الأرض", amount: 2000, paymentStatus: "active" }, { name: "أروى", amount: 8000, paymentStatus: "active" }, { name: "هند", amount: 1500, paymentStatus: "active" }, { name: "محمد سعيد", amount: 2000, paymentStatus: "active" }, { name: "أسماء سعيد", amount: 10000, paymentStatus: "active" }, { name: "ميرا", amount: 6000, paymentStatus: "active" }, { name: "سماح", amount: 900, paymentStatus: "active" }, { name: "خلود", amount: 1600, paymentStatus: "active" }, { name: "ليان", amount: 396, paymentStatus: "active" }, { name: "عمة عزيزة", amount: 500, paymentStatus: "active" }
    ],
    expenses: [
      { name: "الكهرباء", amount: 309, paymentStatus: "active" }, { name: "تمارا", amount: 316.56, paymentStatus: "active" }, { name: "تابي", amount: 381.53, paymentStatus: "active" }, { name: "تابي زوجتي", amount: 184.43, paymentStatus: "active" }, { name: "السواق", amount: 350, paymentStatus: "active" }, { name: "البقالة", amount: 956, paymentStatus: "active" }, { name: "الخضار", amount: 165, paymentStatus: "active" }, { name: "الصيدلية", amount: 400, paymentStatus: "active" }, { name: "الحلاق", amount: 100, paymentStatus: "active" }, { name: "جوالك", amount: 517.5, paymentStatus: "active" }, { name: "جوال المدام", amount: 35, paymentStatus: "active" }
    ]
  };
  let monthlyArchives = JSON.parse(localStorage.getItem("monthlyArchiveV3")) || [];

  function saveToLocal() { 
    localStorage.setItem("financeProPlusV4", JSON.stringify(appData)); 
    checkAndArchive(); 
  }
  function saveArchive() { localStorage.setItem("monthlyArchiveV3", JSON.stringify(monthlyArchives)); }

  // أرشفة تلقائية في يوم 27
  function checkAndArchive() {
    const today = new Date();
    const day = today.getDate();
    if (day === 27) {
      const archiveKey = today.toISOString().slice(0,10);
      const alreadyArchived = monthlyArchives.some(a => a.date === archiveKey);
      if (!alreadyArchived) {
        const snapshot = {
          date: archiveKey,
          bank: JSON.parse(JSON.stringify(appData.bank)),
          loans: JSON.parse(JSON.stringify(appData.loans)),
          expenses: JSON.parse(JSON.stringify(appData.expenses))
        };
        monthlyArchives.push(snapshot);
        saveArchive();
        console.log("تم الأرشفة بتاريخ:", archiveKey);
      }
    }
  }

  function getStatusClass(paymentStatus) {
    if (paymentStatus === "paid") return "paid-item";
    if (paymentStatus === "deferred") return "deferred-item";
    if (paymentStatus === "frozen") return "frozen-item";
    return "";
  }
  
  function getStatusText(status) {
    if (status === "paid") return "✅ مدفوع";
    if (status === "deferred") return "⏰ مؤجل";
    if (status === "frozen") return "❄️ مجمد";
    return "🟢 نشط";
  }

  function renderAll() { 
    renderBank(); 
    renderLoans(); 
    renderExpenses(); 
  }
  
  function renderBank() { renderSection("bank", "bankContainer"); }
  function renderLoans() { renderSection("loans", "loansContainer"); }
  function renderExpenses() { renderSection("expenses", "expensesContainer"); }

  function renderSection(type, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    
    appData[type].forEach((item, idx) => {
      const statusClass = getStatusClass(item.paymentStatus);
      const statusText = getStatusText(item.paymentStatus);
      const div = document.createElement("div");
      div.className = `item ${statusClass}`;
      div.setAttribute("data-type", type);
      div.setAttribute("data-idx", idx);
      
      div.innerHTML = `
        <div class="item-header">
          <span class="item-name">${type==='bank'?'🏦':type==='loans'?'🏠':'🧾'} ${escapeHtml(item.name)}</span>
          <div><span class="amount-badge">${formatNumber(item.amount)} ريال</span> <span class="status-badge-sm">${statusText}</span></div>
        </div>
        <div class="btn-group">
          <button class="btn-edit" data-type="${type}" data-idx="${idx}">✏️ تعديل</button>
          <button class="btn-pay" data-type="${type}" data-idx="${idx}">✅ تم الدفع</button>
          <button class="btn-defer" data-type="${type}" data-idx="${idx}">⏰ تأجيل الدفع</button>
          <button class="btn-freeze" data-type="${type}" data-idx="${idx}">❄️ تجميد</button>
          <button class="btn-delete" data-type="${type}" data-idx="${idx}">🗑️ حذف</button>
        </div>
      `;
      container.appendChild(div);
    });
    
    // ربط الأحداث بعد إضافة العناصر إلى DOM
    attachItemEvents(container);
  }

  function attachItemEvents(container) {
    // تعديل
    container.querySelectorAll(".btn-edit").forEach(btn => {
      btn.removeEventListener("click", handleEdit);
      btn.addEventListener("click", handleEdit);
    });
    // دفع
    container.querySelectorAll(".btn-pay").forEach(btn => {
      btn.removeEventListener("click", handlePay);
      btn.addEventListener("click", handlePay);
    });
    // تأجيل
    container.querySelectorAll(".btn-defer").forEach(btn => {
      btn.removeEventListener("click", handleDefer);
      btn.addEventListener("click", handleDefer);
    });
    // تجميد
    container.querySelectorAll(".btn-freeze").forEach(btn => {
      btn.removeEventListener("click", handleFreeze);
      btn.addEventListener("click", handleFreeze);
    });
    // حذف
    container.querySelectorAll(".btn-delete").forEach(btn => {
      btn.removeEventListener("click", handleDelete);
      btn.addEventListener("click", handleDelete);
    });
  }

  function handleEdit(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    const newName = prompt("اسم جديد", appData[type][idx].name);
    const newAmount = prompt("مبلغ جديد", appData[type][idx].amount);
    if (newName && newName.trim()) appData[type][idx].name = newName.trim();
    if (newAmount && !isNaN(parseFloat(newAmount))) appData[type][idx].amount = parseFloat(newAmount);
    saveToLocal(); 
    renderAll(); 
    if(document.getElementById("salaryInput").value) analyzeFinance();
  }
  
  function handlePay(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type][idx].paymentStatus = "paid";
    saveToLocal(); 
    renderAll(); 
    analyzeFinance();
  }
  
  function handleDefer(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type][idx].paymentStatus = "deferred";
    saveToLocal(); 
    renderAll(); 
    analyzeFinance();
  }
  
  function handleFreeze(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type][idx].paymentStatus = "frozen";
    saveToLocal(); 
    renderAll(); 
    analyzeFinance();
  }
  
  function handleDelete(e) {
    e.stopPropagation();
    if(!confirm("حذف البند نهائياً؟")) return;
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type].splice(idx,1);
    saveToLocal(); 
    renderAll(); 
    analyzeFinance();
  }

  // إضافة عناصر جديدة
  function addItem(type, nameId, amountId) {
    const name = document.getElementById(nameId).value.trim();
    const amount = parseFloat(document.getElementById(amountId).value);
    if(!name || isNaN(amount)) { alert("الرجاء إدخال الاسم والمبلغ بشكل صحيح"); return; }
    appData[type].push({ name, amount, paymentStatus: "active" });
    saveToLocal(); 
    renderAll();
    document.getElementById(nameId).value = ""; 
    document.getElementById(amountId).value = "";
    if(document.getElementById("salaryInput").value) analyzeFinance();
  }

  // التحليل المالي - حسب المنطق الجديد:
  // ✅ المدفوع (paid): يخصم من الراتب
  // ⏰ المؤجل (deferred): لا يخصم
  // ❄️ المجمد (frozen): لا يخصم
  // 🟢 النشط (active): يخصم من الراتب
  function getActiveTotal() {
    let total = 0;
    // يخصم فقط البنود التي حالتها "paid" أو "active"
    const shouldDeduct = (item) => item.paymentStatus === "paid" || item.paymentStatus === "active";
    appData.bank.forEach(b => { if(shouldDeduct(b)) total += b.amount; });
    appData.loans.forEach(l => { if(shouldDeduct(l)) total += l.amount; });
    appData.expenses.forEach(e => { if(shouldDeduct(e)) total += e.amount; });
    return total;
  }
  
  function analyzeFinance() {
    const salary = parseFloat(document.getElementById("salaryInput").value);
    if(isNaN(salary) || salary<=0) { 
      document.getElementById("resultText").innerHTML = "⚠️ الرجاء إدخال الراتب بشكل صحيح"; 
      document.getElementById("statusMessage").innerHTML = "";
      return; 
    }
    const totalDeducted = getActiveTotal();
    const remaining = salary - totalDeducted;
    const ratio = (totalDeducted/salary)*100;
    
    // إحصائيات إضافية للتوضيح
    let paidTotal = 0, activeTotal = 0, deferredTotal = 0, frozenTotal = 0;
    const allItems = [...appData.bank, ...appData.loans, ...appData.expenses];
    allItems.forEach(item => {
      if(item.paymentStatus === "paid") paidTotal += item.amount;
      else if(item.paymentStatus === "active") activeTotal += item.amount;
      else if(item.paymentStatus === "deferred") deferredTotal += item.amount;
      else if(item.paymentStatus === "frozen") frozenTotal += item.amount;
    });
    
    document.getElementById("resultText").innerHTML = `
      <strong>💰 الراتب الشهري:</strong> ${formatNumber(salary)} ريال<br>
      <strong>📌 إجمالي المخصوم من الراتب:</strong> ${formatNumber(totalDeducted)} ريال<br>
      <small style="color:#666;">(المدفوع + النشط)</small><br>
      <strong>✅ المتبقي من الراتب:</strong> ${formatNumber(remaining)} ريال<br>
      <strong>📊 نسبة الاستقطاع:</strong> ${ratio.toFixed(1)}%<br>
      <hr style="margin:8px 0;">
      <small>📈 تفاصيل الالتزامات:<br>
      🟢 نشط: ${formatNumber(activeTotal)} ريال (يخصم)<br>
      ✅ مدفوع: ${formatNumber(paidTotal)} ريال (يخصم)<br>
      ⏰ مؤجل: ${formatNumber(deferredTotal)} ريال (لا يخصم)<br>
      ❄️ مجمد: ${formatNumber(frozenTotal)} ريال (لا يخصم)</small>
    `;
    
    let statusHtml = "";
    if(remaining<0) statusHtml = `<div class="status-badge" style="background:#fee2e2; padding:10px; border-radius:32px; margin-top:10px; text-align:center;">🔴 عجز شهري ${formatNumber(Math.abs(remaining))} ريال - خطر مالي</div>`;
    else if(ratio>65) statusHtml = `<div class="status-badge" style="background:#fff3e0; padding:10px; border-radius:32px; margin-top:10px; text-align:center;">🟠 ضغط مالي مرتفع، نسبة الالتزام عالية جداً</div>`;
    else if(ratio>45) statusHtml = `<div class="status-badge" style="background:#fff9e0; padding:10px; border-radius:32px; margin-top:10px; text-align:center;">🟡 نسبة استقطاع متوسطة</div>`;
    else statusHtml = `<div class="status-badge" style="background:#e0f2e9; padding:10px; border-radius:32px; margin-top:10px; text-align:center;">🟢 وضع مالي جيد، نسبة الالتزام منخفضة</div>`;
    document.getElementById("statusMessage").innerHTML = statusHtml;
  }

  // إنشاء تقرير حسب التبويبات المختارة
  function generateCustomReport(includeBank, includeLoans, includeExpenses, withSalary=true) {
    let salaryVal = parseFloat(document.getElementById("salaryInput").value);
    let report = `<div class="result-box"><h4 style="margin-bottom:12px;">📑 التقرير المالي المخصص</h4>`;
    if(includeBank){
      report += `<div class="report-detail" style="margin:12px 0;"><strong>🏦 البنوك:</strong><br>`;
      appData.bank.forEach(b => { report += `▪ ${escapeHtml(b.name)}: ${formatNumber(b.amount)} ريال (${getStatusText(b.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(includeLoans){
      report += `<div class="report-detail" style="margin:12px 0;"><strong>🏡 السلف والعقار:</strong><br>`;
      appData.loans.forEach(l => { report += `▪ ${escapeHtml(l.name)}: ${formatNumber(l.amount)} ريال (${getStatusText(l.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(includeExpenses){
      report += `<div class="report-detail" style="margin:12px 0;"><strong>🛒 المصاريف:</strong><br>`;
      appData.expenses.forEach(e => { report += `▪ ${escapeHtml(e.name)}: ${formatNumber(e.amount)} ريال (${getStatusText(e.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(withSalary && !isNaN(salaryVal) && salaryVal>0){
      const totalDeducted = getActiveTotal();
      const remaining = salaryVal - totalDeducted;
      const ratio = (totalDeducted/salaryVal)*100;
      report += `<div class="report-detail" style="margin:12px 0; background:#eef2fa; padding:12px; border-radius:16px;">
        <strong>💰 الخلاصة المالية:</strong><br>
        الراتب: ${formatNumber(salaryVal)} ريال<br>
        المخصوم (مدفوع + نشط): ${formatNumber(totalDeducted)} ريال<br>
        المتبقي: ${formatNumber(remaining)} ريال<br>
        نسبة الاستقطاع: ${ratio.toFixed(1)}%
      </div>`;
    }
    report+=`</div>`;
    return report;
  }

  let tempAction = "";
  function openModal(action) {
    tempAction = action;
    document.getElementById("reportModal").style.display = "flex";
  }
  function closeModal() { document.getElementById("reportModal").style.display = "none"; }
  function confirmModal() {
    const incBank = document.getElementById("includeBank").checked;
    const incLoans = document.getElementById("includeLoans").checked;
    const incExp = document.getElementById("includeExpenses").checked;
    const reportHtml = generateCustomReport(incBank, incLoans, incExp, true);
    
    if(tempAction === "print"){
      const printWin = window.open('', '_blank');
      printWin.document.write(`<html dir="rtl"><head><title>تقرير مالي</title><style>body{font-family:sans-serif;padding:20px;}</style></head><body>${reportHtml}</body></html>`);
      printWin.document.close(); 
      printWin.print();
    } else if(tempAction === "whatsapp"){
      let text = `📊 *تقريري المالي*\n\n`;
      if(incBank) text += `🏦 البنوك:\n${appData.bank.map(b=>`▪ ${b.name}: ${formatNumber(b.amount)} ريال (${getStatusText(b.paymentStatus)})`).join('\n')}\n\n`;
      if(incLoans) text += `🏡 السلف والعقار:\n${appData.loans.map(l=>`▪ ${l.name}: ${formatNumber(l.amount)} ريال (${getStatusText(l.paymentStatus)})`).join('\n')}\n\n`;
      if(incExp) text += `🛒 المصاريف:\n${appData.expenses.map(e=>`▪ ${e.name}: ${formatNumber(e.amount)} ريال (${getStatusText(e.paymentStatus)})`).join('\n')}\n\n`;
      const salary = parseFloat(document.getElementById("salaryInput").value);
      if(!isNaN(salary) && salary>0) {
        const totalDeducted = getActiveTotal();
        text += `💰 الراتب: ${formatNumber(salary)} ريال\n💸 المخصوم: ${formatNumber(totalDeducted)} ريال\n✅ المتبقي: ${formatNumber(salary-totalDeducted)} ريال\n📊 نسبة الاستقطاع: ${((totalDeducted/salary)*100).toFixed(1)}%`;
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    } else {
      document.getElementById("fullReportContainer").innerHTML = reportHtml;
    }
    closeModal();
  }

  // عرض الأرشيف
  function showArchive(){
    const archiveDiv = document.getElementById("archiveContainer");
    if(monthlyArchives.length===0){ 
      archiveDiv.innerHTML = "<div class='archive-entry'>📭 لا يوجد أرشيف بعد، سيتم أرشفة البيانات تلقائياً في يوم 27 من كل شهر ميلادي.</div>"; 
      return; 
    }
    let html = "";
    monthlyArchives.slice().reverse().forEach(arch => {
      html += `<div class="archive-entry"><strong>📅 ${arch.date}</strong><br>`;
      html += `<small>🏦 ${arch.bank.map(b=>`${b.name}(${formatNumber(b.amount)}﷼ ${getStatusText(b.paymentStatus)})`).join(', ')}</small><br>`;
      html += `<small>🏠 ${arch.loans.map(l=>`${l.name}(${formatNumber(l.amount)}﷼)`).join(', ')}</small><br>`;
      html += `<small>🛒 ${arch.expenses.map(e=>`${e.name}(${formatNumber(e.amount)}﷼)`).join(', ')}</small>`;
      html += `</div>`;
    });
    archiveDiv.innerHTML = html;
  }

  function formatNumber(n){ if(isNaN(n)) return "0"; return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // التاريخ الميلادي
  function setGregorianDate(){
    const today = new Date();
    document.getElementById("currentGregorianDate").innerText = today.toLocaleDateString('ar-EG');
  }

  function init(){
    setGregorianDate();
    renderAll();
    
    // ربط أزرار الإضافة
    document.getElementById("addBankBtn").onclick = () => addItem("bank","newBankName","newBankAmount");
    document.getElementById("addLoanBtn").onclick = () => addItem("loans","newLoanName","newLoanAmount");
    document.getElementById("addExpBtn").onclick = () => addItem("expenses","newExpName","newExpAmount");
    document.getElementById("analyzeBtn").onclick = analyzeFinance;
    document.getElementById("customReportBtn").onclick = () => openModal("display");
    document.getElementById("shareCustomBtn").onclick = () => openModal("whatsapp");
    document.getElementById("printCustomBtn").onclick = () => openModal("print");
    document.getElementById("viewArchiveBtn").onclick = showArchive;
    document.getElementById("modalConfirmBtn").onclick = confirmModal;
    document.getElementById("modalCloseBtn").onclick = closeModal;
    document.getElementById("salaryInput").addEventListener("input", analyzeFinance);
    
    checkAndArchive();
  }
  
  init();
</script>
</body>
</html>
