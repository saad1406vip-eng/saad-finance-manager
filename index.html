<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>مدير مصروفاتي والتزاماتي | أرشيف شهري</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', sans-serif; background: #f4f7fc; direction: rtl; padding-bottom: 30px; color: #1a2c3e; }
    .app-header { background: #ffffff; padding: 20px 16px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border-bottom: 1px solid #e2edf2; margin-bottom: 20px; }
    .app-header h1 { font-size: 1.6rem; font-weight: 600; color: #1f5e6e; }
    .tabs { display: flex; background: #fff; margin: 0 12px 20px; border-radius: 60px; border: 1px solid #e9edf2; overflow: hidden; }
    .tab-btn { flex: 1; background: transparent; border: none; padding: 10px 6px; font-weight: 600; color: #5c6f87; cursor: pointer; font-family: inherit; }
    .tab-btn.active { background: #e9f3f0; color: #1f6e5c; border-bottom: 2px solid #1f6e5c; }
    .section { display: none; padding: 0 12px; animation: fadeIn 0.2s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 20px; border: 1px solid #eef2f8; }
    .item { background: #ffffff; border-radius: 18px; padding: 12px; margin: 12px 0; border: 1px solid #e6edf4; transition: all 0.1s; }
    .item.frozen-item { background: #f9fafb; border-right: 4px solid #94a3b8; opacity: 0.8; }
    .item.paid-item { background: #e6f7ec; border-right: 4px solid #2e7d64; }
    .item.deferred-item { background: #fff8e7; border-right: 4px solid #f1c40f; }
    .item-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .item-name { font-weight: 700; font-size: 1rem; color: #1e2f3e; }
    .amount-badge { background: #eef3fa; padding: 4px 12px; border-radius: 40px; font-weight: 600; color: #1f6e5c; font-size: 0.8rem; }
    .status-badge-sm { font-size: 0.7rem; padding: 2px 8px; border-radius: 40px; background: #e2e8f0; }
    .btn-group { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: none; padding: 6px 12px; border-radius: 32px; font-weight: 500; font-size: 0.7rem; cursor: pointer; font-family: inherit; background: #f1f5f9; }
    .btn-add { background: #1f6e5c; color: white; }
    .btn-delete { background: #fee2e2; color: #b91c1c; }
    .btn-edit { background: #fff3e0; color: #b45f06; }
    .btn-freeze, .btn-pay, .btn-defer { background: #f0f4f9; }
    .btn-pay { background: #d4edda; color: #155724; }
    .btn-defer { background: #fff3cd; color: #856404; }
    input { width: 100%; padding: 10px 14px; margin: 6px 0; border: 1px solid #cbdde9; border-radius: 32px; font-family: inherit; }
    .result-box { background: #f8fafd; border-radius: 24px; padding: 16px; margin: 12px 0; border: 1px solid #e2edf2; }
    .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 32px; padding: 24px; width: 85%; max-width: 320px; text-align: center; }
    .checkbox-group { text-align: right; margin: 16px 0; display: flex; flex-direction: column; gap: 10px; }
    pre { background: #f1f5f9; padding: 12px; border-radius: 20px; font-size: 0.75rem; white-space: pre-wrap; }
    .archive-entry { background: #fef9e6; border-radius: 16px; padding: 12px; margin-top: 12px; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="app-header"><h1>📋 مدير مصروفاتي والتزاماتي</h1></div>
<div class="tabs">
  <button class="tab-btn active" data-tab="0">🏦 البنكية</button>
  <button class="tab-btn" data-tab="1">🏡 السلف والعقار</button>
  <button class="tab-btn" data-tab="2">🛒 المصاريف</button>
  <button class="tab-btn" data-tab="3">📊 التحليل & التقارير</button>
</div>

<!-- الأقسام -->
<div class="section active" id="section-0"><div class="card"><h3>الالتزامات البنكية</h3><div id="bankContainer"></div><input id="newBankName" placeholder="اسم البنك"><input id="newBankAmount" type="number" placeholder="القسط الشهري"><button class="btn-add" id="addBankBtn">➕ إضافة</button></div></div>
<div class="section" id="section-1"><div class="card"><h3>السلف والعقار</h3><div id="loansContainer"></div><input id="newLoanName" placeholder="الاسم"><input id="newLoanAmount" type="number" placeholder="المبلغ"><button class="btn-add" id="addLoanBtn">➕ إضافة</button></div></div>
<div class="section" id="section-2"><div class="card"><h3>المصاريف الشهرية</h3><div id="expensesContainer"></div><input id="newExpName" placeholder="اسم المصروف"><input id="newExpAmount" type="number" placeholder="المبلغ"><button class="btn-add" id="addExpBtn">➕ إضافة</button></div></div>

<div class="section" id="section-3">
  <div class="card">
    <h3>📊 التحليل المالي والتقارير</h3>
    <div style="font-size:0.85rem; margin-bottom:12px;">📅 التاريخ الميلادي: <span id="currentGregorianDate"></span></div>
    <input type="number" id="salaryInput" placeholder="🏦 الراتب الشهري">
    <button class="btn-add" id="analyzeBtn" style="width:100%; margin:10px 0;">📐 حساب الالتزامات النشطة</button>
    <div id="analysisResult" class="result-box"><p id="resultText">-- انتظر التحليل --</p><div id="statusMessage"></div></div>
    <div class="flex-btns">
      <button id="customReportBtn" class="btn-add" style="background:#2c5282;">📄 تقرير مخصص (اختيار التبويبات)</button>
      <button id="shareCustomBtn" class="btn-add" style="background:#25D366;">📱 مشاركة تقرير مخصص</button>
      <button id="printCustomBtn" class="btn-add" style="background:#4b5563;">🖨️ طباعة تقرير مخصص</button>
    </div>
    <div id="fullReportContainer" style="margin-top: 16px;"></div>
    <hr>
    <h4>📦 الأرشيف الشهري (يوم 27 من كل شهر)</h4>
    <button id="viewArchiveBtn" class="btn-add" style="background:#6c757d;">📂 عرض الأرشيف</button>
    <div id="archiveContainer"></div>
  </div>
</div>

<!-- مودال اختيار التبويبات -->
<div id="reportModal" class="modal">
  <div class="modal-content">
    <h3>اختر التبويبات للتقرير</h3>
    <div class="checkbox-group">
      <label><input type="checkbox" id="includeBank" checked> 🏦 البنكية</label>
      <label><input type="checkbox" id="includeLoans" checked> 🏡 السلف والعقار</label>
      <label><input type="checkbox" id="includeExpenses" checked> 🛒 المصاريف</label>
    </div>
    <div class="flex-btns" style="justify-content:center;">
      <button id="modalConfirmBtn" class="btn-add">تأكيد وإنشاء</button>
      <button id="modalCloseBtn" style="background:#ccc;">إلغاء</button>
    </div>
  </div>
</div>

<script>
  // --- هيكل البيانات مع دعم paymentStatus (paid, deferred, frozen, active)
  let appData = JSON.parse(localStorage.getItem("financeProPlusV2")) || {
    bank: [
      { name: "تمويل الراجحي", amount: 5311.30, paymentStatus: "active" },
      { name: "بنك الرياض", amount: 5168.99, paymentStatus: "active" },
      { name: "تمويل إضافي", amount: 0, paymentStatus: "frozen" }
    ],
    loans: [
      { name: "قسط الأرض", amount: 2000, paymentStatus: "active" }, { name: "أروى", amount: 8000, paymentStatus: "active" }, { name: "هند", amount: 1500, paymentStatus: "active" }, { name: "محمد سعيد", amount: 2000, paymentStatus: "active" }, { name: "أسماء سعيد", amount: 10000, paymentStatus: "active" }, { name: "ميرا", amount: 6000, paymentStatus: "active" }, { name: "سماح", amount: 900, paymentStatus: "active" }, { name: "خلود", amount: 1600, paymentStatus: "active" }, { name: "ليان", amount: 396, paymentStatus: "active" }, { name: "عمة عزيزة", amount: 500, paymentStatus: "active" }
    ],
    expenses: [
      { name: "الكهرباء", amount: 309, paymentStatus: "active" }, { name: "تمارا", amount: 316.56, paymentStatus: "active" }, { name: "تابي", amount: 381.53, paymentStatus: "active" }, { name: "تابي زوجتي", amount: 184.43, paymentStatus: "active" }, { name: "السواق", amount: 350, paymentStatus: "active" }, { name: "البقالة", amount: 956, paymentStatus: "active" }, { name: "الخضار", amount: 165, paymentStatus: "active" }, { name: "الصيدلية", amount: 400, paymentStatus: "active" }, { name: "الحلاق", amount: 100, paymentStatus: "active" }, { name: "جوالك", amount: 517.5, paymentStatus: "active" }, { name: "جوال المدام", amount: 35, paymentStatus: "active" }
    ]
  };
  let monthlyArchives = JSON.parse(localStorage.getItem("monthlyArchive")) || [];

  function saveToLocal() { localStorage.setItem("financeProPlusV2", JSON.stringify(appData)); checkAndArchive(); }
  function saveArchive() { localStorage.setItem("monthlyArchive", JSON.stringify(monthlyArchives)); }

  // أرشفة تلقائية في يوم 27
  function checkAndArchive() {
    const today = new Date();
    const day = today.getDate();
    if (day === 27) {
      const archiveKey = today.toISOString().slice(0,10);
      const alreadyArchived = monthlyArchives.some(a => a.date === archiveKey);
      if (!alreadyArchived) {
        const snapshot = {
          date: archiveKey,
          bank: JSON.parse(JSON.stringify(appData.bank)),
          loans: JSON.parse(JSON.stringify(appData.loans)),
          expenses: JSON.parse(JSON.stringify(appData.expenses))
        };
        monthlyArchives.push(snapshot);
        saveArchive();
      }
    }
  }

  function getStatusClass(paymentStatus) {
    if (paymentStatus === "frozen") return "frozen-item";
    if (paymentStatus === "paid") return "paid-item";
    if (paymentStatus === "deferred") return "deferred-item";
    return "";
  }
  function getStatusText(status) {
    if (status === "paid") return "✅ مدفوع";
    if (status === "deferred") return "⏰ مؤجل";
    if (status === "frozen") return "❄️ مجمد";
    return "🟢 نشط";
  }

  function renderAll() { renderBank(); renderLoans(); renderExpenses(); }
  function renderBank() { renderSection("bank", "bankContainer"); }
  function renderLoans() { renderSection("loans", "loansContainer"); }
  function renderExpenses() { renderSection("expenses", "expensesContainer"); }

  function renderSection(type, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";
    appData[type].forEach((item, idx) => {
      const statusClass = getStatusClass(item.paymentStatus);
      const statusText = getStatusText(item.paymentStatus);
      const div = document.createElement("div");
      div.className = `item ${statusClass}`;
      div.innerHTML = `
        <div class="item-header">
          <span class="item-name">${type==='bank'?'🏦':type==='loans'?'🏠':'🧾'} ${escapeHtml(item.name)}</span>
          <div><span class="amount-badge">${formatNumber(item.amount)} ريال</span> <span class="status-badge-sm">${statusText}</span></div>
        </div>
        <div class="btn-group">
          <button class="btn-edit" data-type="${type}" data-idx="${idx}" data-action="edit">✏️ تعديل</button>
          <button class="btn-delete" data-type="${type}" data-idx="${idx}" data-action="delete">🗑️ حذف</button>
          <button class="btn-pay" data-type="${type}" data-idx="${idx}" data-action="pay">✅ تم الدفع</button>
          <button class="btn-defer" data-type="${type}" data-idx="${idx}" data-action="defer">⏰ تأجيل الدفع</button>
          <button class="btn-freeze" data-type="${type}" data-idx="${idx}" data-action="freeze">❄️ تجميد</button>
        </div>
      `;
      container.appendChild(div);
    });
    attachItemEvents(container);
  }

  function attachItemEvents(container) {
    container.querySelectorAll(".btn-edit").forEach(btn => { btn.onclick = handleEdit; });
    container.querySelectorAll(".btn-delete").forEach(btn => { btn.onclick = handleDelete; });
    container.querySelectorAll(".btn-pay").forEach(btn => { btn.onclick = () => handleStatusChange(btn, "paid"); });
    container.querySelectorAll(".btn-defer").forEach(btn => { btn.onclick = () => handleStatusChange(btn, "deferred"); });
    container.querySelectorAll(".btn-freeze").forEach(btn => { btn.onclick = () => handleStatusChange(btn, "frozen"); });
  }

  function handleEdit(e) {
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    const newName = prompt("اسم جديد", appData[type][idx].name);
    const newAmount = prompt("مبلغ جديد", appData[type][idx].amount);
    if (newName && newName.trim()) appData[type][idx].name = newName.trim();
    if (newAmount && !isNaN(parseFloat(newAmount))) appData[type][idx].amount = parseFloat(newAmount);
    saveToLocal(); renderAll(); if(document.getElementById("salaryInput").value) analyzeFinance();
  }
  function handleDelete(e) {
    if(!confirm("حذف البند نهائياً؟")) return;
    const btn = e.currentTarget;
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type].splice(idx,1);
    saveToLocal(); renderAll(); analyzeFinance();
  }
  function handleStatusChange(btn, newStatus) {
    const type = btn.getAttribute("data-type");
    const idx = parseInt(btn.getAttribute("data-idx"));
    appData[type][idx].paymentStatus = newStatus;
    saveToLocal(); renderAll(); analyzeFinance();
  }

  // إضافة
  function addItem(type, nameId, amountId) {
    const name = document.getElementById(nameId).value.trim();
    const amount = parseFloat(document.getElementById(amountId).value);
    if(!name || isNaN(amount)) { alert("أدخل الاسم والمبلغ"); return; }
    appData[type].push({ name, amount, paymentStatus: "active" });
    saveToLocal(); renderAll();
    document.getElementById(nameId).value = ""; document.getElementById(amountId).value = "";
    if(document.getElementById("salaryInput").value) analyzeFinance();
  }

  // التحليل (يحسب النشط فقط: ليس مجمد وليس مدفوع؟ حسب الطلب: المدفوع لا يخصم والمؤجل يخصم؟ بناءً على المنطق المالي: المدفوع لا يخصم، المؤجل يخصم، المجمد لا يخصم)
  function getActiveTotal() {
    let total = 0;
    const isActive = (item) => item.paymentStatus !== "paid" && item.paymentStatus !== "frozen";
    appData.bank.forEach(b => { if(isActive(b)) total += b.amount; });
    appData.loans.forEach(l => { if(isActive(l)) total += l.amount; });
    appData.expenses.forEach(e => { if(isActive(e)) total += e.amount; });
    return total;
  }
  function analyzeFinance() {
    const salary = parseFloat(document.getElementById("salaryInput").value);
    if(isNaN(salary) || salary<=0) { document.getElementById("resultText").innerHTML="⚠️ أدخل الراتب"; return; }
    const totalActive = getActiveTotal();
    const remaining = salary - totalActive;
    const ratio = (totalActive/salary)*100;
    document.getElementById("resultText").innerHTML = `<strong>📌 الالتزامات المستحقة (غير المدفوعة وغير المجمدة):</strong> ${formatNumber(totalActive)} ريال<br><strong>💰 المتبقي:</strong> ${formatNumber(remaining)} ريال<br><strong>📊 نسبة الاستقطاع:</strong> ${ratio.toFixed(1)}%`;
    let statusHtml = "";
    if(remaining<0) statusHtml = `<div class="status-badge" style="background:#fee2e2;">🔴 عجز شهري ${formatNumber(Math.abs(remaining))} ريال</div>`;
    else if(ratio>65) statusHtml = `<div class="status-badge" style="background:#fff3e0;">🟠 ضغط مرتفع</div>`;
    else if(ratio>45) statusHtml = `<div class="status-badge" style="background:#fff9e0;">🟡 نسبة متوسطة</div>`;
    else statusHtml = `<div class="status-badge" style="background:#e0f2e9;">🟢 وضع جيد</div>`;
    document.getElementById("statusMessage").innerHTML = statusHtml;
  }

  // إنشاء تقرير حسب التبويبات المختارة (للمعاينة أو الطباعة أو المشاركة)
  function generateCustomReport(includeBank, includeLoans, includeExpenses, withSalary=true) {
    let salaryVal = parseFloat(document.getElementById("salaryInput").value);
    let report = `<div class="result-box"><h4>📑 التقرير المالي المخصص</h4>`;
    if(includeBank){
      report += `<div class="report-detail"><strong>🏦 البنوك:</strong><br>`;
      appData.bank.forEach(b => { report += `▪ ${escapeHtml(b.name)}: ${formatNumber(b.amount)} ريال (${getStatusText(b.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(includeLoans){
      report += `<div class="report-detail"><strong>🏡 السلف والعقار:</strong><br>`;
      appData.loans.forEach(l => { report += `▪ ${escapeHtml(l.name)}: ${formatNumber(l.amount)} ريال (${getStatusText(l.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(includeExpenses){
      report += `<div class="report-detail"><strong>🛒 المصاريف:</strong><br>`;
      appData.expenses.forEach(e => { report += `▪ ${escapeHtml(e.name)}: ${formatNumber(e.amount)} ريال (${getStatusText(e.paymentStatus)})<br>`; });
      report+=`</div>`;
    }
    if(withSalary && !isNaN(salaryVal) && salaryVal>0){
      const activeTotal = getActiveTotal();
      const remaining = salaryVal - activeTotal;
      const ratio = (activeTotal/salaryVal)*100;
      report += `<div class="report-detail"><strong>💰 الخلاصة:</strong><br>الراتب: ${formatNumber(salaryVal)} ريال<br>المستحق (غير المدفوع/المجمد): ${formatNumber(activeTotal)} ريال<br>المتبقي: ${formatNumber(remaining)} ريال<br>نسبة الالتزام: ${ratio.toFixed(1)}%</div>`;
    }
    report+=`</div>`;
    return report;
  }

  let tempReportHtml = "";
  let tempAction = "";
  function openModal(callbackAction) {
    tempAction = callbackAction;
    document.getElementById("reportModal").style.display = "flex";
  }
  function closeModal() { document.getElementById("reportModal").style.display = "none"; }
  function confirmModal() {
    const incBank = document.getElementById("includeBank").checked;
    const incLoans = document.getElementById("includeLoans").checked;
    const incExp = document.getElementById("includeExpenses").checked;
    const reportHtml = generateCustomReport(incBank, incLoans, incExp, true);
    if(tempAction === "print"){
      const printWin = window.open('', '_blank');
      printWin.document.write(`<html dir="rtl"><head><title>تقرير مالي</title><style>body{font-family:sans-serif;padding:20px;}</style></head><body>${reportHtml}</body></html>`);
      printWin.document.close(); printWin.print();
    } else if(tempAction === "whatsapp"){
      let text = `📊 *تقريري المالي*\n`;
      if(incBank) text += `🏦 البنوك: ${appData.bank.map(b=>`${b.name}(${formatNumber(b.amount)}﷼ ${getStatusText(b.paymentStatus)})`).join(', ')}\n`;
      if(incLoans) text += `🏡 السلف: ${appData.loans.map(l=>`${l.name}(${formatNumber(l.amount)}﷼ ${getStatusText(l.paymentStatus)})`).join(', ')}\n`;
      if(incExp) text += `🛒 المصاريف: ${appData.expenses.map(e=>`${e.name}(${formatNumber(e.amount)}﷼ ${getStatusText(e.paymentStatus)})`).join(', ')}\n`;
      const salary = parseFloat(document.getElementById("salaryInput").value);
      if(!isNaN(salary)) text += `💰 الراتب: ${formatNumber(salary)} ريال\nالمستحق: ${formatNumber(getActiveTotal())} ريال\nالمتبقي: ${formatNumber(salary-getActiveTotal())} ريال`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    } else {
      document.getElementById("fullReportContainer").innerHTML = reportHtml;
    }
    closeModal();
  }

  // عرض الأرشيف
  function showArchive(){
    const archiveDiv = document.getElementById("archiveContainer");
    if(monthlyArchives.length===0){ archiveDiv.innerHTML = "<div class='archive-entry'>لا يوجد أرشيف بعد، سيتم أرشفة البيانات في يوم 27 من كل شهر.</div>"; return; }
    let html = "";
    monthlyArchives.slice().reverse().forEach(arch => {
      html += `<div class="archive-entry"><strong>📅 ${arch.date}</strong><br>🏦 بنوك: ${arch.bank.map(b=>`${b.name}(${formatNumber(b.amount)} ${getStatusText(b.paymentStatus)})`).join(', ')}<br>🏠 سلف: ${arch.loans.map(l=>`${l.name}(${formatNumber(l.amount)})`).join(', ')}<br>🛒 مصاريف: ${arch.expenses.map(e=>`${e.name}(${formatNumber(e.amount)})`).join(', ')}</div>`;
    });
    archiveDiv.innerHTML = html;
  }

  function formatNumber(n){ if(isNaN(n)) return "0"; return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // التاريخ الميلادي
  function setGregorianDate(){
    const today = new Date();
    document.getElementById("currentGregorianDate").innerText = today.toLocaleDateString('ar-EG');
  }

  function init(){
    setGregorianDate();
    renderAll();
    document.getElementById("addBankBtn").onclick = () => addItem("bank","newBankName","newBankAmount");
    document.getElementById("addLoanBtn").onclick = () => addItem("loans","newLoanName","newLoanAmount");
    document.getElementById("addExpBtn").onclick = () => addItem("expenses","newExpName","newExpAmount");
    document.getElementById("analyzeBtn").onclick = analyzeFinance;
    document.getElementById("customReportBtn").onclick = () => openModal("display");
    document.getElementById("shareCustomBtn").onclick = () => openModal("whatsapp");
    document.getElementById("printCustomBtn").onclick = () => openModal("print");
    document.getElementById("viewArchiveBtn").onclick = showArchive;
    document.getElementById("modalConfirmBtn").onclick = confirmModal;
    document.getElementById("modalCloseBtn").onclick = closeModal;
    document.getElementById("salaryInput").addEventListener("input", analyzeFinance);
    checkAndArchive();
  }
  init();
</script>
</body>
</html>
